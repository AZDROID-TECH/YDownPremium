services:
  - name: ydownpremium-api
    type: web
    runtime: docker
    plan: free
    rootDir: apps/backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production

  - name: ydownpremium-web
    type: web
    runtime: static
    rootDir: apps/frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://ydownpremium-api.onrender.com
